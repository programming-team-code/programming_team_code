name: Install LLVM
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - run: |
      wget https://apt.llvm.org/llvm.sh
      chmod +x llvm.sh
      sudo ./llvm.sh 22
      sudo apt-get update
      sudo apt-get install -y clang-format-22 clang-tidy-22
      clang-22 --version
      clang-format-22 --version
      clang-tidy-22 --version
